edge_types:
  royalty:
    priority: 1
    weight: 1.0
  commercial:
    priority: 2
    weight: 0.75
  performance:
    priority: 3
    weight: 0.5
  similarity:
    priority: 4
    weight: 0.25

similarity_edges:
  enabled: true
  top_percent: 0.01
  direction: both
  drop_overlap_with_known_edges: true

duplicate_policy: heterogeneous

bipartite:
  strict: true
